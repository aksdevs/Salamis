name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  linux-packages:
    name: Linux packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install RPM packaging tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Configure
        run: cmake -S . -B build-package -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-package --config Release

      - name: Test
        run: ctest --test-dir build-package --build-config Release --output-on-failure

      - name: Build Debian package
        run: cpack --config build-package/CPackConfig.cmake -G DEB

      - name: Build RPM package
        run: cpack --config build-package/CPackConfig.cmake -G RPM

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: salamis-linux-packages
          path: |
            *.deb
            *.rpm
